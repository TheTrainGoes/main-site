<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crossword Puzzle Generator &mdash; Kid Sheets</title>
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
  <header class="site-header no-print">
    <div class="container">
      <h1>Kid Sheets</h1>
      <p>Free printable activity sheets for kids</p>
    </div>
  </header>

  <main class="container">
    <div class="no-print">
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      <div class="page-title">
        <h1>Crossword Puzzle Generator</h1>
        <p>Fill in the squares using the across and down clues.</p>
      </div>
    </div>

    <div class="controls-card no-print">
      <div class="form-row">
        <div class="form-group">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy &mdash; 11&times;11 grid</option>
            <option value="medium" selected>Medium &mdash; 13&times;13 grid</option>
            <option value="hard">Hard &mdash; 15&times;15 grid</option>
          </select>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="animals">Animals</option>
            <option value="space">Space</option>
            <option value="nature">Nature</option>
            <option value="school">School</option>
          </select>
        </div>
        <div class="form-group form-group--btn">
          <button id="generate-btn" class="btn btn-primary">Generate</button>
        </div>
      </div>
    </div>

    <div id="output" class="output-card hidden">
      <div class="puzzle-header">
        <h2>Crossword Puzzle</h2>
        <p id="cw-subtitle"></p>
      </div>

      <div class="cw-layout">
        <div id="cw-grid-wrapper" class="cw-grid-wrapper"></div>
        <div class="cw-clues">
          <div class="cw-clues-col">
            <h3 class="cw-clues-heading">Across</h3>
            <ul id="cw-across-list" class="cw-clue-list"></ul>
          </div>
          <div class="cw-clues-col">
            <h3 class="cw-clues-heading">Down</h3>
            <ul id="cw-down-list" class="cw-clue-list"></ul>
          </div>
        </div>
      </div>

      <div class="output-actions no-print">
        <label class="answer-key-label">
          <input type="checkbox" id="answer-key-check"> Print answer key on second page
        </label>
        <button id="print-btn" class="btn btn-secondary">Print / Save as PDF</button>
        <button id="regen-btn" class="btn btn-primary">Regenerate</button>
      </div>
    </div>

    <div id="cw-answer-key" class="cw-answer-key">
      <div class="puzzle-header">
        <h2>Crossword Puzzle</h2>
        <p>Answer Key</p>
      </div>
      <div class="cw-layout">
        <div id="cw-answer-grid-wrapper" class="cw-grid-wrapper"></div>
        <div class="cw-clues">
          <div class="cw-clues-col">
            <h3 class="cw-clues-heading">Across</h3>
            <ul id="cw-answer-across-list" class="cw-clue-list"></ul>
          </div>
          <div class="cw-clues-col">
            <h3 class="cw-clues-heading">Down</h3>
            <ul id="cw-answer-down-list" class="cw-clue-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/crossword.js"></script>
</body>
</html>
