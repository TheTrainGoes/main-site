<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Search Generator &mdash; Kid Sheets</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header no-print">
    <div class="container">
      <h1>Kid Sheets</h1>
      <p>Free printable activity sheets for kids</p>
    </div>
  </header>

  <main class="container">
    <div class="no-print">
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      <div class="page-title">
        <h1>Word Search Generator</h1>
        <p>Choose your options and click Generate to create a unique word search every time.</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-card no-print">
      <div class="form-row">
        <div class="form-group">
          <label for="difficulty">Size</label>
          <select id="difficulty">
            <option value="small">Small &mdash; 10&times;10, 10 words</option>
            <option value="medium" selected>Medium &mdash; 15&times;15, 15 words</option>
            <option value="large">Large &mdash; 20&times;20, 20 words</option>
          </select>
        </div>

        <div class="form-group">
          <label for="gender">Category</label>
          <select id="gender">
            <option value="general" selected>General</option>
            <option value="boy">Boy</option>
            <option value="girl">Girl</option>
          </select>
        </div>

        <div class="form-group">
          <label for="grade">Grade</label>
          <select id="grade">
            <option value="kindergarten">Kindergarten</option>
            <option value="grade1">Grade 1</option>
            <option value="grade2" selected>Grade 2</option>
            <option value="grade3">Grade 3</option>
          </select>
        </div>

        <div class="form-group">
          <label for="topic">Topic</label>
          <select id="topic"></select>
        </div>

        <div class="form-group form-group--btn">
          <button id="generate-btn" class="btn btn-primary">Generate</button>
        </div>
      </div>
    </div>

    <!-- Output -->
    <div id="output" class="output-card hidden">
      <div class="puzzle-header">
        <h2 id="puzzle-title"></h2>
        <p id="puzzle-subtitle"></p>
      </div>

      <div class="ws-grid-wrapper">
        <div id="ws-grid" class="ws-grid"></div>
      </div>

      <div class="word-list">
        <h3>Find these words</h3>
        <div id="word-list-items" class="word-list-items"></div>
      </div>

      <div class="output-actions no-print">
        <button id="print-btn" class="btn btn-secondary">Print / Save as PDF</button>
        <button id="regen-btn" class="btn btn-primary">Regenerate</button>
      </div>
    </div>
  </main>

  <script src="js/word-search.js"></script>
</body>
</html>
