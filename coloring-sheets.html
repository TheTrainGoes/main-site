<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coloring Sheets &mdash; Kid Sheets</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Kid Sheets</h1>
      <p>Free printable activity sheets for kids</p>
    </div>
  </header>

  <main class="container">
    <div class="page-title">
      <a href="index.html" class="back-link">&larr; Home</a>
      <h1>Coloring Sheets</h1>
      <p>Choose a category to browse and print.</p>
    </div>

    <div class="cs-category-grid" id="category-grid">

      <a href="coloring-sheets-cats.html" class="cs-category-card" id="card-cats">
        <div class="cs-category-thumb-wrap">
          <img class="cs-category-thumb" id="thumb-cats" src="" alt="Cats coloring sheets">
        </div>
        <div class="cs-category-label">
          <span class="cs-category-name">Cats</span>
          <span class="cs-category-count">69 sheets</span>
        </div>
      </a>

    </div>
  </main>

  <script>
    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    const CAT_SHEETS = [
      'Cat-with-Shirt-and-Bowtie-Riding-a-Bicycle-Coloring-Sheet',
      'Big-Cat-Sitting-On-The-Grass',
      'Realistic-Cat-Walking-on-a-Rooftop-with-Blossoming-Trees-Coloring-Page',
      'Ferocious-Meowzilla-Cat-Attacking-City-with-Flames-Coloring-Page',
      'Cat-with-Beanie-Knitting-on-a-Chair-by-the-Window-in-Winter-Coloring-Sheet',
      'Curious-Cat-Sitting-on-a-Rooftop-with-City-Skyline-Coloring-Page',
      'Chef-Cat-Making-Sushi-with-Chopsticks-Coloring-Page-for-Kids',
      'DJ-Cat-Wearing-Sunglasses-and-Headphones-Coloring-Page',
      'Unicorn-Cat-Sitting-on-Fluffy-Clouds-with-Sparkling-Stars-Coloring-Page',
    ];
    document.getElementById('thumb-cats').src = 'coloring sheets/cats/' + pickRandom(CAT_SHEETS) + '.jpg';
  </script>
</body>
</html>
