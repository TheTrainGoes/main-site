<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Generator &mdash; Kid Sheets</title>
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
  <header class="site-header no-print">
    <div class="container">
      <h1>Kid Sheets</h1>
      <p>Free printable activity sheets for kids</p>
    </div>
  </header>

  <main class="container">
    <div class="no-print">
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      <div class="page-title">
        <h1>Sudoku Generator</h1>
        <p>Choose your difficulty and click Generate to create a unique Sudoku puzzle every time.</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-card no-print">
      <div class="form-row">
        <div class="form-group">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <div class="form-group form-group--btn">
          <button id="generate-btn" class="btn btn-primary">Generate</button>
        </div>
      </div>
    </div>

    <!-- Output -->
    <div id="output" class="output-card hidden">
      <div class="puzzle-header">
        <h2>Sudoku</h2>
        <p id="sudoku-subtitle"></p>
      </div>

      <div class="sudoku-grid-wrapper">
        <div id="sudoku-grid" class="sudoku-grid"></div>
      </div>

      <div class="output-actions no-print">
        <label class="answer-key-label">
          <input type="checkbox" id="answer-key-check"> Print answer key on second page
        </label>
        <button id="print-btn" class="btn btn-secondary">Print / Save as PDF</button>
        <button id="regen-btn" class="btn btn-primary">Regenerate</button>
      </div>
    </div>

    <div id="sudoku-answer-key" class="sudoku-answer-key">
      <div class="puzzle-header">
        <h2>Sudoku</h2>
        <p>Answer Key</p>
      </div>
      <div class="sudoku-grid-wrapper">
        <div id="sudoku-answer-grid" class="sudoku-grid"></div>
      </div>
    </div>
  </main>

  <script src="js/sudoku.js"></script>
</body>
</html>
