<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze Generator &mdash; Kid Sheets</title>
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
  <header class="site-header no-print">
    <div class="container">
      <h1>Kid Sheets</h1>
      <p>Free printable activity sheets for kids</p>
    </div>
  </header>

  <main class="container">
    <div class="no-print">
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      <div class="page-title">
        <h1>Maze Generator</h1>
        <p>Choose your size and click Generate to create a unique maze every time.</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-card no-print">
      <div class="form-row">
        <div class="form-group">
          <label for="size">Size</label>
          <select id="size">
            <option value="10">Small &mdash; 10&times;10</option>
            <option value="15" selected>Medium &mdash; 15&times;15</option>
            <option value="20">Large &mdash; 20&times;20</option>
          </select>
        </div>

        <div class="form-group form-group--btn">
          <button id="generate-btn" class="btn btn-primary">Generate</button>
        </div>
      </div>
    </div>

    <!-- Output -->
    <div id="output" class="output-card hidden">
      <div class="puzzle-header">
        <h2>Maze</h2>
        <p id="maze-subtitle"></p>
      </div>

      <div class="maze-wrapper" id="maze-wrapper"></div>

      <div class="output-actions no-print">
        <label class="answer-key-label">
          <input type="checkbox" id="answer-key-check"> Print answer key on second page
        </label>
        <button id="print-btn" class="btn btn-secondary">Print / Save as PDF</button>
        <button id="regen-btn" class="btn btn-primary">Regenerate</button>
      </div>
    </div>

    <div id="maze-answer-key" class="maze-answer-key">
      <div class="puzzle-header">
        <h2>Maze</h2>
        <p>Answer Key</p>
      </div>
      <div class="maze-wrapper" id="maze-answer-wrapper"></div>
    </div>
  </main>

  <script src="js/maze.js"></script>
</body>
</html>
