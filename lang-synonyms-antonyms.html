<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synonyms &amp; Antonyms &mdash; Kid Sheets</title>
  <link rel="stylesheet" href="css/style.css?v=10">
</head>
<body>
  <header class="site-header no-print">
    <div class="container">
      <h1>Kid Sheets</h1>
      <p>Free printable activity sheets for kids</p>
    </div>
  </header>

  <main class="container">
    <div class="no-print">
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      <div class="page-title">
        <h1>Synonyms &amp; Antonyms</h1>
        <p>Match each word in Column A to its synonym or antonym in Column B.</p>
      </div>
    </div>

    <div class="controls-card no-print">
      <div class="form-row">
        <div class="form-group">
          <label for="grade">Difficulty</label>
          <select id="grade"></select>
        </div>
        <div class="form-group">
          <label for="type">Type</label>
          <select id="type">
            <option value="synonyms">Synonyms</option>
            <option value="antonyms">Antonyms</option>
          </select>
        </div>
        <div class="form-group form-group--btn">
          <button id="generate-btn" class="btn btn-primary">Generate</button>
        </div>
      </div>
    </div>

    <div id="output" class="output-card hidden">
      <div class="puzzle-header">
        <h2 id="worksheet-title"></h2>
        <p id="worksheet-subtitle"></p>
      </div>

      <div class="math-worksheet-header">
        <div class="math-ws-field">Name: <span class="math-ws-line"></span></div>
        <div class="math-ws-field">Date: <span class="math-ws-line"></span></div>
      </div>

      <div class="lang-match-header">
        <span class="lang-match-col-label">Column A</span>
        <span class="lang-match-col-label">Column B</span>
      </div>
      <div id="match-grid" class="lang-match-grid"></div>

      <div class="lang-score">Score: _____ / 15</div>

      <div class="output-actions no-print">
        <label class="answer-key-label">
          <input type="checkbox" id="answer-key-check"> Print answer key on second page
        </label>
        <button id="print-btn" class="btn btn-secondary">Print / Save as PDF</button>
        <button id="regen-btn" class="btn btn-primary">Regenerate</button>
      </div>
    </div>

    <div id="answer-key" class="answer-key">
      <div class="puzzle-header">
        <h2 id="answer-key-title"></h2>
        <p>Answer Key</p>
      </div>
      <div id="answer-grid" class="answer-grid lang-answer-grid"></div>
    </div>
  </main>

  <script src="js/lang-data.js"></script>
  <script src="js/lang-synonyms-antonyms.js"></script>
</body>
</html>
