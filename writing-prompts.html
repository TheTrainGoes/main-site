<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing Prompt Sheets &mdash; Kid Sheets</title>
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
  <header class="site-header no-print">
    <div class="container">
      <h1>Kid Sheets</h1>
      <p>Free printable activity sheets for kids</p>
    </div>
  </header>

  <main class="container">
    <div class="no-print">
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      <div class="page-title">
        <h1>Writing Prompt Sheets</h1>
        <p>Generate a printable writing prompt with lined space to respond.</p>
      </div>
    </div>

    <div class="controls-card no-print">
      <div class="form-row">
        <div class="form-group">
          <label for="grade">Grade Level</label>
          <select id="grade">
            <option value="k2">K&ndash;2 (Early Elementary)</option>
            <option value="35" selected>3&ndash;5 (Elementary)</option>
            <option value="68">6&ndash;8 (Middle School)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="type">Prompt Type</label>
          <select id="type">
            <option value="random" selected>Random</option>
            <option value="narrative">Narrative</option>
            <option value="descriptive">Descriptive</option>
            <option value="opinion">Opinion</option>
            <option value="creative">Creative</option>
            <option value="informative">Informative</option>
          </select>
        </div>
        <div class="form-group">
          <label for="lines">Writing Lines</label>
          <select id="lines">
            <option value="10">10 lines (short)</option>
            <option value="16" selected>16 lines (medium)</option>
            <option value="22">22 lines (long)</option>
          </select>
        </div>
        <div class="form-group form-group--btn">
          <button id="generate-btn" class="btn btn-primary">Generate</button>
        </div>
      </div>
    </div>

    <div id="output" class="output-card hidden">
      <div class="puzzle-header">
        <h2>Writing Prompt</h2>
        <p id="prompt-type-label"></p>
      </div>

      <div class="wp-prompt-box">
        <p id="prompt-text"></p>
      </div>

      <div class="wp-header-fields">
        <div class="wp-field">Name: <span class="wp-underline wp-underline--long"></span></div>
        <div class="wp-field">Date: <span class="wp-underline wp-underline--short"></span></div>
      </div>

      <div id="writing-lines" class="wp-lines"></div>

      <div class="output-actions no-print">
        <button id="print-btn" class="btn btn-secondary">Print / Save as PDF</button>
        <button id="regen-btn" class="btn btn-primary">New Prompt</button>
      </div>
    </div>
  </main>

  <script src="js/writing-prompts.js"></script>
</body>
</html>
