<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractions Worksheets &mdash; Kid Sheets</title>
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
  <header class="site-header no-print">
    <div class="container">
      <h1>Kid Sheets</h1>
      <p>Free printable activity sheets for kids</p>
    </div>
  </header>

  <main class="container">
    <div class="no-print">
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      <div class="page-title">
        <h1>Fractions Worksheets</h1>
        <p>Choose a problem type and difficulty, then click Generate to create a unique worksheet every time.</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-card no-print">
      <div class="form-row">
        <div class="form-group">
          <label for="type">Problem Type</label>
          <select id="type">
            <option value="add">Adding Fractions</option>
            <option value="subtract">Subtracting Fractions</option>
            <option value="combine">Combining Mixed Numbers</option>
            <option value="reduce">Reducing Fractions</option>
          </select>
        </div>

        <div class="form-group">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <div class="form-group">
          <label for="count">Number of Problems</label>
          <select id="count">
            <option value="10">10 problems</option>
            <option value="20" selected>20 problems</option>
            <option value="30">30 problems</option>
          </select>
        </div>

        <div class="form-group form-group--btn">
          <button id="generate-btn" class="btn btn-primary">Generate</button>
        </div>
      </div>
    </div>

    <!-- Output -->
    <div id="output" class="output-card hidden">
      <div class="puzzle-header">
        <h2 id="worksheet-title"></h2>
      </div>

      <div class="math-worksheet-header">
        <div class="math-ws-field">Name: <span class="math-ws-line"></span></div>
        <div class="math-ws-field">Date: <span class="math-ws-line"></span></div>
      </div>

      <div id="problems-grid" class="fraction-problems-grid"></div>

      <div class="ws-score">Total: _____ / <span id="ws-total"></span></div>

      <div class="output-actions no-print">
        <label class="answer-key-label">
          <input type="checkbox" id="answer-key-check"> Print answer key on second page
        </label>
        <button id="print-btn" class="btn btn-secondary">Print / Save as PDF</button>
        <button id="regen-btn" class="btn btn-primary">Regenerate</button>
      </div>
    </div>

    <div id="answer-key" class="answer-key">
      <div class="answer-key-header">
        <h2 id="answer-key-title"></h2>
        <p>Answer Key</p>
      </div>
      <div id="answer-grid" class="answer-grid frac-answer-grid"></div>
    </div>
  </main>

  <script src="js/math-fractions.js?v=1"></script>
</body>
</html>
