<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Printable Calendar &amp; Planner &mdash; Kid Sheets</title>
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
  <header class="site-header no-print">
    <div class="container">
      <h1>Kid Sheets</h1>
      <p>Free printable activity sheets for kids</p>
    </div>
  </header>

  <main class="container">
    <div class="no-print">
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      <div class="page-title">
        <h1>Printable Calendar &amp; Planner</h1>
        <p>Generate a printable monthly calendar or weekly planner.</p>
      </div>
    </div>

    <div class="controls-card no-print">
      <div class="form-row">
        <div class="form-group">
          <label for="cal-style">Style</label>
          <select id="cal-style">
            <option value="monthly" selected>Monthly Calendar</option>
            <option value="weekly">Weekly Planner</option>
          </select>
        </div>
        <div class="form-group" id="month-group">
          <label for="cal-month">Month</label>
          <select id="cal-month">
            <option value="0">January</option>
            <option value="1">February</option>
            <option value="2">March</option>
            <option value="3">April</option>
            <option value="4">May</option>
            <option value="5">June</option>
            <option value="6">July</option>
            <option value="7">August</option>
            <option value="8">September</option>
            <option value="9">October</option>
            <option value="10">November</option>
            <option value="11">December</option>
          </select>
        </div>
        <div class="form-group">
          <label for="cal-year">Year</label>
          <input type="number" id="cal-year" class="cs-number-input" value="2026" min="2020" max="2035" style="width:6rem">
        </div>
        <div class="form-group" id="week-start-group">
          <label for="week-start">Week Starts</label>
          <select id="week-start">
            <option value="0" selected>Sunday</option>
            <option value="1">Monday</option>
          </select>
        </div>
        <div class="form-group form-group--btn">
          <button id="generate-btn" class="btn btn-primary">Generate</button>
        </div>
      </div>
    </div>

    <div id="output" class="output-card hidden">
      <div class="puzzle-header">
        <h2 id="cal-title"></h2>
      </div>

      <div id="cal-body"></div>

      <div class="output-actions no-print">
        <button id="print-btn" class="btn btn-secondary">Print / Save as PDF</button>
        <button id="regen-btn" class="btn btn-primary">Regenerate</button>
      </div>
    </div>
  </main>

  <script src="js/calendar-planner.js"></script>
</body>
</html>
